<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Historia</title>
<link rel="stylesheet" href="Historia.css">
</head>

<body>

<div class="pagina">

    <!-- Fondo degradado -->
    <div class="fondo"></div>

    <!-- NAV -->
    <nav class="nav">
        <div class="nav-container">

            <button class="boton-volver">

                <div class="icono-volver">
                    <svg viewBox="0 0 24 24">
                        <path d="m12 19-7-7 7-7"></path>
                        <path d="M19 12H5"></path>
                    </svg>
                </div>

                <span class="texto-volver">
                    VOLVER
                </span>

            </button>

        </div>
    </nav>

    <!-- CONTENIDO -->
    <div class="contenido">

        <div class="grid">

            <!-- TEXTO IZQUIERDA -->
            <div class="lado-izquierdo">

                <div class="titulo-container">

                    <div class="etiqueta">
                        VIDEO ANIMACION
                    </div>

                    <h1 class="titulo">
                        CONOCE LA HISTORIA
                    </h1>

                    <p class="descripcion">
                        Experiencias que te ayudarán a reconocer
                        situaciones de acoso.
                    </p>

                </div>

                <div class="boton-personajes">

                    <button class="btn-personajes">
                        <span>Personajes</span>
                    </button>

                </div>

            </div>


            <!-- VIDEO DERECHA -->
            <div class="lado-derecho">

                <div class="video-titulo">

                    <div class="icono-play"></div>

                    <h2>
                        Animación
                    </h2>

                </div>


                <div class="video-container">

                    <img src="video-preview.jpg" class="video-fondo">

                    <div class="play-centro">

                        <div class="play-boton">

                            <svg viewBox="0 0 24 24">
                                <polygon points="6 3 20 12 6 21 6 3"></polygon>
                            </svg>

                        </div>

                    </div>

                </div>


                <div class="info-video">

                    <p>
                        Acompaña a nuestra protagonista en su día a día y aprende
                        a identificar señales de acoso callejero.
                    </p>

                    <div class="botones">

                        <button class="btn-ver">
                            VER AHORA
                        </button>

                        <button class="btn-info">
                            MÁS INFO
                        </button>

                    </div>

                </div>


                <div class="stats">

                    <div class="stat">
                        <div class="numero">30 seg</div>
                        <div class="texto">Duración</div>
                    </div>

                    <div class="stat">
                        <div class="numero">3</div>
                        <div class="texto">Escenarios</div>
                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

</body>
</html>
