<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Historia</title>
<link rel="stylesheet" href="Historia.css">
</head>

<body>

<div class="pagina">

    <!-- Fondo degradado -->
    <div class="fondo"></div>

    <!-- NAV -->
    <nav class="nav">
        <div class="nav-container">

            <button class="boton-volver">

                <div class="icono-volver">
                    <svg viewBox="0 0 24 24">
                        <path d="m12 19-7-7 7-7"></path>
                        <path d="M19 12H5"></path>
                    </svg>
                </div>

                <span class="texto-volver">
                    VOLVER
                </span>

            </button>

        </div>
    </nav>

    <!-- CONTENIDO -->
    <div class="contenido">

        <div class="grid">

            <!-- TEXTO IZQUIERDA -->
            <div class="lado-izquierdo">

                <div class="titulo-container">
                    
                    <div class="etiqueta-video">
                        <span>VIDEO ANIMACION</span>
                    </div>

                    <h1 class="titulo-historia">
                    CONOCE LA HISTORIA
                    </h1>

                    <p class="descripcion-historia">
                    Experiencias que te ayudarán a reconocer situaciones de acoso
                    </p>

                </div>

                    <div class="contenedor-personajes">

                    <button class="boton-personajes">

                        <div class="contenido-boton">

                            <svg class="icono-personajes" viewBox="0 0 24 24">
                                <path d="M9.937 15.5A2 2 0 0 0 8.5 14.063l-6.135-1.582a.5.5 0 0 1 0-.962L8.5 9.936A2 2 0 0 0 9.937 8.5l1.582-6.135a.5.5 0 0 1 .963 0L14.063 8.5A2 2 0 0 0 15.5 9.937l6.135 1.581a.5.5 0 0 1 0 .964L15.5 14.063a2 2 0 0 0-1.437 1.437l-1.582 6.135a.5.5 0 0 1-.963 0z"></path>
                                <path d="M20 3v4"></path>
                                <path d="M22 5h-4"></path>
                                <path d="M4 17v2"></path>
                                <path d="M5 18H3"></path>
                            </svg>

                            <span>Personajes</span>

                        </div>

                    </button>

                    </div>

            </div>


            <!-- VIDEO DERECHA -->
            <div class="lado-derecho">

            <div class="titulo-video">

                <div class="icono-play-contenedor">

                    <svg class="icono-play" viewBox="0 0 24 24">
                        <polygon points="6 3 20 12 6 21 6 3"></polygon>
                    </svg>

                </div>

                <h2 class="titulo-animacion">
                    Animación
                </h2>

            </div>


                <div class="video-container">

                    <img src="video-preview.jpg" class="video-fondo">

                    <div class="play-centro">

                        <div class="play-boton">

                            <svg viewBox="0 0 24 24">
                                <polygon points="6 3 20 12 6 21 6 3"></polygon>
                            </svg>

                        </div>

                    </div>

                </div>


                <div class="info-video">

                    <p>
                        Acompaña a nuestra protagonista en su día a día y aprende
                        a identificar señales de acoso callejero.
                    </p>

                    <div class="botones">

                        <button class="btn-ver">
                            VER AHORA
                        </button>

                        <button class="btn-info">
                            MÁS INFO
                        </button>

                    </div>

                </div>


                <div class="stats">

                    <div class="stat">
                        <div class="numero">30 seg</div>
                        <div class="texto">Duración</div>
                    </div>

                    <div class="stat">
                        <div class="numero">3</div>
                        <div class="texto">Escenarios</div>
                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

</body>
</html>
