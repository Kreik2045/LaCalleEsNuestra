<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ruta Interactiva</title>
<link rel="stylesheet" href="RutaInteractiva.css">
</head>

<body>

<div class="ruta-container">

    <!-- FONDO -->
    <div class="background-gradient"></div>

    <div class="ruta-content">

        <!-- BOTON VOLVER -->
        <div class="volver-container">

            <button class="btn-volver" onclick="window.location.href='Home.html'" style="cursor:pointer;">

                <svg class="icon-volver" viewBox="0 0 24 24">
                    <path d="m12 19-7-7 7-7"></path>
                    <path d="M19 12H5"></path>
                </svg>

                <span class="texto-volver">VOLVER</span>

            </button>

        </div>

        <!-- TITULO -->
        <div class="ruta-header">

            <h1 class="titulo-ruta">
                RUTA INTERACTIVA
            </h1>

            <p class="descripcion-ruta">
                Ingresa tu ubicación y descubre la mejor ruta para tu seguridad
            </p>

        </div>

        <!-- GRID PRINCIPAL -->
        <div class="ruta-grid">

            <!-- PANEL IZQUIERDO -->
            <div class="panel-ruta">

                <div class="panel-header">

                    <div class="panel-header-top">

                        <div class="panel-dot"></div>

                        <h3 class="panel-titulo">
                            PLANIFICA TU RUTA
                        </h3>

                    </div>

                    <div class="panel-linea"></div>

                </div>

<!--                 <div class="input-grupo">
                    <label>PUNTO DE INICIO</label>
                    <input type="text" placeholder="Ej. Avenida Reforma 123">
                </div>

                <div class="input-grupo">
                    <label>PUNTO DE DESTINO</label>
                    <input type="text" placeholder="Ej. Parque Chapultepec">
                </div> -->

                <div class="form-ruta">

                    <!-- INICIO -->
                    <div class="campo-ruta">

                        <label class="label-ruta">
                            PUNTO DE INICIO
                        </label>

                        <div class="input-icon">

                            <svg class="icon-input inicio" viewBox="0 0 24 24">
                                <path d="M20 10c0 4.993-5.539 10.193-7.399 11.799a1 1 0 0 1-1.202 0C9.539 20.193 4 14.993 4 10a8 8 0 0 1 16 0"/>
                                <circle cx="12" cy="10" r="3"/>
                            </svg>

                            <input
                            type="text"
                            placeholder="Punto de destino"
                            class="input-ruta">

                        </div>

                    </div>


                    <!-- DESTINO -->
                    <div class="campo-ruta">

                        <label class="label-ruta">
                            PUNTO DE DESTINO
                        </label>

                        <div class="input-icon">

                            <svg class="icon-input destino" viewBox="0 0 24 24">
                                <path d="M20 10c0 4.993-5.539 10.193-7.399 11.799a1 1 0 0 1-1.202 0C9.539 20.193 4 14.993 4 10a8 8 0 0 1 16 0"/>
                                <circle cx="12" cy="10" r="3"/>
                            </svg>

                            <input
                            type="text"
                            placeholder="Punto de destino"
                            class="input-ruta destino-input">

                        </div>

                    </div>

                </div>

                <div class="descarga">
                    <p class="descripcion-descarga">
                        Si deseas compartir tu ubicación con tus familiares o amigos.
                    </p>

                    <p class="descripcion-descargados">
                        Descarga la aplicación aquí
                    </p>

                    <img src="./Images/playstore.png">
                    <img src="./Images/appstore.png">
                </div>

                <div class="botones-ruta">

                    <button class="btn-animacion">

                        <div class="btn-animacion-overlay"></div>

                        <div class="btn-animacion-content">

                            <svg class="icon-play" viewBox="0 0 24 24">
                                <polygon points="6 3 20 12 6 21 6 3"></polygon>
                            </svg>

                            <span class="texto-animacion">
                                VER ANIMACIÓN (HABILITAR)
                            </span>

                        </div>

                    </button>

                    <button class="btn-volver-inicio">

                        <div class="btn-inicio-overlay"></div>

                        <div class="btn-inicio-content">

                            <span class="texto-inicio">
                                VOLVER A INICIO
                            </span>

                        </div>

                    </button>

                </div>

            </div>

            <!-- PANEL MAPA -->
            <div class="panel-mapa">

                <div class="mapa-header">

                    <div class="mapa-header-left">

                        <div class="mapa-dot"></div>

                        <h3 class="mapa-header-titulo">
                            MAPA INTERACTIVO DE RUTA SEGURA
                        </h3>

                    </div>

                </div>

                <div class="mapa-contenedor">

                    <div class="imagenmapa"> 
                        <img src="Images/puntodeinicioydestino.png" class="mapa-img" onclick="window.location.href='RutaAR.html'"
style="cursor:pointer;">
                    </div>   

                    <div class="mapa-leyenda">

                        <div class="leyenda-items">

                            <div class="leyenda-item">

                                <img src="Images/location 1.png" class="icon-leyenda-img">

                                <span>Puntos de ayuda</span>

                            </div>


                            <div class="leyenda-item">

                                <div class="leyenda-dot2"></div>

                                <span>Zonas de riesgo</span>

                            </div>


                            <div class="leyenda-item">

                                <div class="leyenda-dot3"></div>

                                <span>Zonas seguras</span>

                            </div>


                            <div class="leyenda-item">

                                <div class="leyenda-dot4"></div>

                                <span>Serenazgo</span>

                            </div>

                        </div>

                    </div>
                </div>
            </div>

        </div>

    </div>

</div>

</body>
</html>
